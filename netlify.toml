[build]
  publish = "_site"
  command = """
    curl -L -o quarto.tar.gz https://github.com/quarto-dev/quarto-cli/releases/download/v1.4.550/quarto-1.4.550-linux-amd64.tar.gz && \
    tar -xzf quarto.tar.gz && \
    export PATH=$PATH:$(pwd)/quarto-1.4.550/bin && \
    python3 -m pip install --upgrade pip && \
    python3 -m pip install jupyter ipykernel pyyaml pandas numpy matplotlib scipy sklearn statsmodels torch tensorflow transformers && \
    python3 -m ipykernel install --user && \
    quarto render || true
  """

[build.environment]
  QUARTO_VERSION = "1.4.550"
  PYTHON_VERSION = "3.9"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
