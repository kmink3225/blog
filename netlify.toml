[build]
  publish = "_site"
  command = """
    # 1. Quarto 설치
    curl -L -o quarto.tar.gz https://github.com/quarto-dev/quarto-cli/releases/download/v1.4.550/quarto-1.4.550-linux-amd64.tar.gz && \
    tar -xzf quarto.tar.gz && \
    export PATH=$PATH:$(pwd)/quarto-1.4.550/bin && \
    
    # 2. Python 의존성 설치
    python3 -m pip install --upgrade pip && \
    python3 -m pip install jupyter ipykernel pyyaml pandas numpy matplotlib plotly scipy nbformat nbclient && \
    python3 -m ipykernel install --user && \
    
    # 3. 렌더링 (에러 무시 옵션 추가하여 빌드 완료 우선)
    quarto render || true
  """

[build.environment]
  QUARTO_VERSION = "1.4.550"
  PYTHON_VERSION = "3.9"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
