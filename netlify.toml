[build]
  publish = "_site"
  command = """
    curl -L -o /tmp/quarto.tar.gz https://github.com/quarto-dev/quarto-cli/releases/download/v1.4.550/quarto-1.4.550-linux-amd64.tar.gz && \
    tar -xzf /tmp/quarto.tar.gz -C /tmp && \
    export PATH=$PATH:/tmp/quarto-1.4.550/bin && \
    quarto render
  """

[build.environment]
  QUARTO_VERSION = "1.4.550"
