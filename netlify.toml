[build]
  publish = "_site"
  command = """
    # 1. Quarto 설치
    curl -L -o quarto.tar.gz https://github.com/quarto-dev/quarto-cli/releases/download/v1.4.550/quarto-1.4.550-linux-amd64.tar.gz && \
    tar -xzf quarto.tar.gz && \
    export PATH=$PATH:$(pwd)/quarto-1.4.550/bin && \
    
    # 2. Python 3.11, R 및 시스템 의존성 설치
    apt-get update && \
    apt-get install -y python3.11 python3.11-distutils python3-pip r-base libssl-dev libcurl4-openssl-dev libxml2-dev && \
    
    # 3. R 패키지 설치
    Rscript -e 'pkgs <- readLines("r_requirements.txt"); install.packages(pkgs, repos="https://cloud.r-project.org")' && \
    
    # 4. Python 의존성 설치
    python3.11 -m pip install --upgrade pip --break-system-packages && \
    python3.11 -m pip install -r requirements.txt --break-system-packages && \
    
    # 5. 렌더링
    quarto render || true
  """

[build.environment]
  QUARTO_VERSION = "1.4.550"
  MISE_VERSION = "disable"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
