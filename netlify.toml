[build]
  publish = "_site"
  command = "curl -L -o quarto.tar.gz https://github.com/quarto-dev/quarto-cli/releases/download/v1.4.550/quarto-1.4.550-linux-amd64.tar.gz && tar -xzf quarto.tar.gz && ./quarto-1.4.550/bin/quarto render"

[build.environment]
  QUARTO_VERSION = "1.4.550"
  PYTHON_VERSION = "3.9"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
