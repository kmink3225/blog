[build]
  publish = "_site"
  # mise를 활용한 자동 Python 설치 및 나머지 빌드 수행
  command = """
    # 1. Quarto 설치
    curl -L -o quarto.tar.gz https://github.com/quarto-dev/quarto-cli/releases/download/v1.4.550/quarto-1.4.550-linux-amd64.tar.gz && \
    tar -xzf quarto.tar.gz && \
    export PATH=$PATH:$(pwd)/quarto-1.4.550/bin && \
    
    # 2. R 및 시스템 의존성 설치
    apt-get update && apt-get install -y r-base libssl-dev libcurl4-openssl-dev libxml2-dev && \
    Rscript -e 'pkgs <- readLines("r_requirements.txt"); install.packages(pkgs, repos="https://cloud.r-project.org")' && \
    
    # 3. Python 의존성 설치 (mise가 3.10.14를 준비하면 실행)
    python -m pip install --upgrade pip && \
    python -m pip install -r requirements.txt && \
    
    # 4. 렌더링
    quarto render || true
  """

[build.environment]
  QUARTO_VERSION = "1.4.550"
  MISE_PYTHON_COMPILE = "false"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
