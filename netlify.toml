[build]
  publish = "_site"
  command = """
    # 1. Quarto 설치
    curl -L -o quarto.tar.gz https://github.com/quarto-dev/quarto-cli/releases/download/v1.4.550/quarto-1.4.550-linux-amd64.tar.gz && \
    tar -xzf quarto.tar.gz && \
    export PATH=$PATH:$(pwd)/quarto-1.4.550/bin && \
    
    # 2. Python 의존성 설치 (Netlify가 자동으로 수행)
    
    # 3. R 의존성 설치
    Rscript -e 'install.packages(c("tidyverse", "dplyr", "janitor", "tidymodels", "MASS", "glmnet", "mgcv", "lme4", "faraway", "mcr", "pwr", "bayestestR", "BayesFactor", "car", "ggpubr", "ggplot2", "plotly", "markdown", "effects", "HH", "heplots", "caret", "mixOmics", "psych", "svd"), repos="https://cloud.r-project.org")' && \
    
    # 4. 렌더링
    quarto render || true
  """

[build.environment]
  QUARTO_VERSION = "1.4.550"
  PYTHON_VERSION = "3.9"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
